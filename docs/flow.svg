<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12102a"/><stop offset="0.55" stop-color="#0b0b12"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#241a52"/><stop offset="1" stop-color="#1a2540"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8b7cff"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#46d39a"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#e0894a"/></marker>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/></filter>
    <style>
      .t{fill:#f2f1fb;font-weight:800} .s{fill:#b9b9d6} .e{font-weight:800;letter-spacing:.5px}
    </style>
  </defs>
  <rect width="1120" height="720" fill="url(#bgf)"/>
  <text x="60" y="54" fill="#8b7cff" font-weight="800" letter-spacing="2" font-size="15">VEREL · THE EVAL-DRIVEN LOOP</text>
  <text x="60" y="82" class="s" font-size="16">The agent proposes; the verdict bus decides “done”. No self-asserted success.</text>

  <!-- A: write -->
  <rect x="430" y="120" width="260" height="64" rx="14" fill="#15151f" stroke="#2a2a3c" filter="url(#s2)"/>
  <text x="560" y="150" text-anchor="middle" class="t" font-size="18">✍️  Agent acts / writes</text>
  <text x="560" y="170" text-anchor="middle" class="s" font-size="13">a hypothesis</text>
  <line x1="560" y1="184" x2="560" y2="214" stroke="#8b7cff" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- B: perceive -->
  <rect x="410" y="218" width="300" height="64" rx="14" fill="#15151f" stroke="#2a2a3c" filter="url(#s2)"/>
  <text x="560" y="248" text-anchor="middle" class="t" font-size="18">👁️  Render &amp; perceive</text>
  <text x="560" y="268" text-anchor="middle" class="s" font-size="13">senses → percepts (eyes, tests, lint, types)</text>
  <line x1="560" y1="282" x2="560" y2="312" stroke="#8b7cff" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- C: gate hub -->
  <rect x="400" y="316" width="320" height="86" rx="16" fill="url(#gate)" stroke="#5a4fd0" stroke-width="1.5" filter="url(#s2)"/>
  <text x="560" y="350" text-anchor="middle" class="t" font-size="20">⚖️  gate() — verdict bus</text>
  <text x="560" y="376" text-anchor="middle" class="s" font-size="13.5">attested · advisory clamped · fingerprinted</text>

  <!-- STUCK branch (left) -->
  <line x1="400" y1="359" x2="320" y2="359" stroke="#e0894a" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="360" y="349" text-anchor="middle" class="e" fill="#e0894a" font-size="13">stuck</text>
  <rect x="60" y="320" width="260" height="78" rx="14" fill="#1d1714" stroke="#5c4326" filter="url(#s2)"/>
  <text x="190" y="352" text-anchor="middle" class="t" font-size="17">⏫  Escalate</text>
  <text x="190" y="374" text-anchor="middle" class="s" font-size="13">model ladder → human handoff</text>

  <!-- FAIL + progressed branch (right) -> fix -> loop back to perceive -->
  <line x1="720" y1="359" x2="800" y2="359" stroke="#8b7cff" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="762" y="349" text-anchor="middle" class="e" fill="#8b7cff" font-size="13">fail · progressed</text>
  <rect x="800" y="320" width="260" height="78" rx="14" fill="#15151f" stroke="#2a2a3c" filter="url(#s2)"/>
  <text x="930" y="352" text-anchor="middle" class="t" font-size="17">🛠️  Agent fixes source</text>
  <text x="930" y="374" text-anchor="middle" class="s" font-size="13">patch only the failing issues</text>
  <!-- loop back: fix top -> up -> left into perceive right edge -->
  <path d="M930 320 L930 250 L710 250" fill="none" stroke="#8b7cff" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="930" y="242" text-anchor="middle" class="s" font-size="13">re-render &amp; re-gate</text>

  <!-- PASS branch (down) -> Done -->
  <line x1="560" y1="402" x2="560" y2="446" stroke="#46d39a" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="585" y="430" class="e" fill="#46d39a" font-size="13">pass</text>
  <rect x="408" y="450" width="304" height="74" rx="16" fill="#16271f" stroke="#2c5c46" filter="url(#s2)"/>
  <text x="560" y="482" text-anchor="middle" class="t" font-size="18" fill="#7ee6b6">✅  Done — self-computed</text>
  <text x="560" y="504" text-anchor="middle" class="s" font-size="13">the only way the loop terminates green</text>

  <!-- verified -> memory -->
  <line x1="712" y1="487" x2="800" y2="487" stroke="#46d39a" stroke-width="2.5" marker-end="url(#ag)"/>
  <rect x="800" y="456" width="260" height="62" rx="14" fill="#15151f" stroke="#2a2a3c" filter="url(#s2)"/>
  <text x="930" y="484" text-anchor="middle" class="t" font-size="16">🧠  Compounds to memory</text>
  <text x="930" y="504" text-anchor="middle" class="s" font-size="12.5">only verified work graduates</text>

  <text x="560" y="600" text-anchor="middle" class="s" font-size="14">Progress = strict shrinkage of the gating-failure set · churn and growth are not progress.</text>
  <text x="560" y="640" text-anchor="middle" fill="#8b7cff" font-family="ui-monospace,Menlo,monospace" font-size="13">verel.loop · verel.ci.self_heal</text>
</svg>
