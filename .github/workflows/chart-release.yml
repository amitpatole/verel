name: chart-release
# Package, push, and cosign-sign the OCI Helm chart to ghcr.io on a v* tag, and push the Artifact Hub
# repository-metadata artifact so the chart is discoverable + verified on Artifact Hub. Validation
# (lint/template/k3d+kind install) runs separately in chart.yml on every change.
#
# Third-party actions are SHA-pinned (repo convention, see ci.yml). Fires only on a tag push — nothing
# publishes until then.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CHART_REPO: ghcr.io/amitpatole/charts        # oci://ghcr.io/amitpatole/charts/verel

jobs:
  chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push the OCI chart + repo-metadata to ghcr
      id-token: write        # cosign keyless (OIDC)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Log in to ghcr (helm + oras)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package + push the OCI chart
        id: push
        run: |
          set -euo pipefail
          helm package deploy/chart --destination dist
          CHART_TGZ=$(ls dist/verel-*.tgz)
          # `helm push` prints the pushed digest to stderr; capture it for signing
          helm push "$CHART_TGZ" "oci://${CHART_REPO}" 2>&1 | tee push.log
          echo "digest=$(grep -oE 'sha256:[0-9a-f]{64}' push.log | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cosign keyless sign the chart
        run: cosign sign --yes "${CHART_REPO}/verel@${{ steps.push.outputs.digest }}"

      - name: Push Artifact Hub repo metadata
        run: |
          # Artifact Hub reads artifacthub-repo.yml as an OCI artifact at the repo path to verify ownership.
          oras push "oci://${CHART_REPO}/verel:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            deploy/chart/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml || \
            echo "oras push skipped (install oras or register the repo first)"
