name: ci
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the GITHUB_TOKEN is read-only for every job in this workflow.
# Fork PRs get a read-only token and NO repository secrets (GitHub default) — so even a
# malicious fork PR cannot push, tag, release, or read secrets.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:   # a throwaway Redis so the redis-backend FULL contract + concurrency proofs RUN in CI
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      VEREL_REDIS_URL: redis://127.0.0.1:6379/15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: false
      - name: Create venv + install (core + dev + attest)
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev,attest,postgres,lancedb,redis]"   # attest=pynacl (receipt tests); postgres=psycopg/pgvector (pg-backend security UNIT tests RUN; live-DB tests skip without VEREL_PG_SMOKE); lancedb=embedded (full contract RUNS); redis=client + a redis service (full contract + concurrency RUN)
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Lint (ruff)
        run: ruff check src tests examples
      - name: Types (mypy)
        run: mypy src
      - name: Tests (sight/mem0/bwrap tests skip when deps absent)
        run: python -m pytest -q
      - name: Dogfood — Verel gates Verel via its own verdict bus
        run: |
          python - <<'PY'
          from verel.ci import premerge_stage, run_stage
          res = run_stage(premerge_stage(".", covers=["src"]), diff_files={"src"})
          print("premerge verdict:", res.verdict.value)
          for r in res.reports:
              print(" ", r.grader.value, "->", r.verdict.value, "(attested)" if r.run_receipt else "")
          assert res.verdict.value == "pass", "Verel's own verdict bus rejected this change"
          PY
