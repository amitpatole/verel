name: image
# Build, scan, sign and publish the hardened Verel container image (Chainguard Wolfi base, distroless,
# nonroot) to GitHub Container Registry with a full supply-chain story: multi-arch, SBOM, SLSA
# provenance, cosign keyless signature, and a trivy/grype gate at 0 HIGH/CRITICAL.
#
# NOTE: third-party actions below are intentionally version-tagged for this DRAFT; SHA-PIN every
# `uses:` (the repo convention, see ci.yml) before this workflow is merged/enabled.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/amitpatole/verel

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr
      id-token: write        # cosign keyless (OIDC) + provenance attestations
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-qemu-action@v3          # arm64 emulation for multi-arch
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build + push (multi-arch, SBOM + SLSA provenance)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max        # SLSA provenance attestation
          sbom: true                  # SPDX SBOM attestation
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Grype scan (defense in depth)
        uses: anchore/scan-action@v4
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          severity-cutoff: high
          fail-build: true
      - name: Cosign keyless sign (OIDC)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
        env:
          IMAGE: ${{ env.IMAGE }}
