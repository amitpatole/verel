name: image
# Build, scan, sign and publish the hardened Verel container image (Chainguard Wolfi base, distroless,
# nonroot) to GitHub Container Registry with a full supply-chain story: multi-arch, SBOM, SLSA
# provenance, cosign keyless signature, and a trivy/grype gate at 0 HIGH/CRITICAL.
#
# Third-party actions are SHA-pinned (repo convention, see ci.yml); the trailing `# vX` is the tag the
# SHA corresponds to. Bump via dependabot/renovate.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/amitpatole/verel

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr
      id-token: write        # cosign keyless (OIDC) + provenance attestations
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3 — arm64 emulation for multi-arch
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to ghcr
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build + push (multi-arch, SBOM + SLSA provenance)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max        # SLSA provenance attestation
          sbom: true                  # SPDX SBOM attestation
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      # Gate on FIXABLE HIGH/CRITICAL only (matches trivy's ignore-unfixed). An unfixed upstream CVE
      # isn't actionable at release; the daily Wolfi rebuild + renovate pick up fixes when they land.
      - name: Grype scan (defense in depth)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0 — current grype + fresh vuln DB (v4 shipped a stale DB)
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          severity-cutoff: high
          only-fixed: true
          fail-build: true
      - name: Cosign keyless sign (OIDC)
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
        env:
          IMAGE: ${{ env.IMAGE }}
