name: OG images

on:
  push:
    branches: [main]
    paths:
      - "brand/social_*.html"
      - "brand/render_og.py"
      - ".github/workflows/og.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: og-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install playwright
      - run: python -m playwright install --with-deps chromium
      - run: python brand/render_og.py
      - name: Publish rendered OG images to og-assets branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brand/og-*.png
          if git diff --cached --quiet; then
            echo "no OG image changes"
          else
            # main is a protected branch (PR + checks required), so the bot can't push to it.
            # Publish the generated assets to an unprotected og-assets branch instead; the
            # Space og:image references that branch via raw.githubusercontent.
            git commit -m "Render OG card images [skip ci]"
            git push --force origin HEAD:og-assets
          fi
