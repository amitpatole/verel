name: OG images

on:
  push:
    branches: [main]
    paths:
      - "brand/social_*.html"
      - "brand/render_og.py"
      - ".github/workflows/og.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: og-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install playwright
      - run: python -m playwright install --with-deps chromium
      - run: python brand/render_og.py
      - name: Publish rendered OG images to og-assets branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Skip if the rendered image is byte-identical to what's already published.
          git fetch --depth=1 origin og-assets 2>/dev/null || true
          git show origin/og-assets:brand/og-verel.png > /tmp/pub-og.png 2>/dev/null || true
          if [ -s /tmp/pub-og.png ] && cmp -s /tmp/pub-og.png brand/og-verel.png; then
            echo "no OG image changes"; exit 0
          fi
          # main is a protected branch (the bot can't push to it). Publish to an unprotected og-assets
          # branch — but ONLY the rendered images, via a CLEAN ORPHAN branch (never a snapshot of the
          # whole repo tree): keeps the public branch a single PNG and means no tracked file can ever
          # leak onto it. The Space og:image references it via raw.githubusercontent.
          git checkout --orphan og-assets-pub
          git rm -r --cached . >/dev/null 2>&1 || true
          git add -f brand/og-*.png
          git commit -m "Render OG card images [skip ci]"
          git push --force origin og-assets-pub:og-assets
