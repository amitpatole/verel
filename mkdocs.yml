site_name: Verel
site_description: >-
  The agent framework where nothing is "done" until a grader returns a verdict — verification,
  grounded perception (AgentVision eyes), compounding memory, a fleet, and agent-run CI/CD.
site_url: https://amitpatole.github.io/verel/
repo_url: https://github.com/amitpatole/verel
repo_name: amitpatole/verel
copyright: MIT © Amit Patole
docs_dir: docs

theme:
  name: material
  palette:
    scheme: default          # Warm Paper — light, editorial
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Get started: getting-started.md
  - Try it yourself: try-it.md
  - 5-minute tutorial: tutorial.md
  - Use cases: use-cases.md
  - Real-world scenarios: examples.md
  - Adoption: adoption.md
  - Guides:
      - Developer guide: usage.md
      - Architecture: ARCHITECTURE.md
  - Reference:
      - CLI: cli.md
      - Configuration: configuration.md
      - Python API: api.md
  - Help:
      - FAQ & troubleshooting: faq.md

# Keep internal design + critic-round notes OUT of the public site (defense-in-depth even if
# a file lingers in docs/): they are not part of the public documentation.
exclude_docs: |
  VEREL_DESIGN.md
  CRITIC_CONVERGENCE.md
  SUBSTRATE_DESIGN.md
  VERIFIED_REVIEW_DESIGN.md
  SECURITY_RESIDUALS.md
  K8S_DEPLOYMENT_DESIGN.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amitpatole/verel
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/verel/
