apiVersion: v2
name: verel
description: |
  Verel — verified agents. This chart deploys the GatewayService (the `verel serve` REST gate +
  GitHub PR-webhook endpoint) as a hardened, TLS-fronted Deployment. Runs on Kubernetes and k3s.
type: application
# Chart version is bumped per chart change (independent of appVersion, which tracks the image tag).
# 1.0.1: add the artifacthub.io/images annotation so Artifact Hub runs the security scan.
version: 1.0.1
appVersion: "1.0.0"
home: https://amitpatole.github.io/verel/
sources:
  - https://github.com/amitpatole/verel
keywords: [verel, agents, verification, ci, gate, kubernetes, k3s]
maintainers:
  - name: amitpatole
    url: https://github.com/amitpatole
annotations:
  # Artifact Hub metadata (https://artifacthub.io/docs/topics/annotations/helm/)
  # Images to scan: AH doesn't render templates, so it only security-scans images listed here.
  # The tag tracks appVersion (bumped per release).
  artifacthub.io/images: |
    - name: gateway
      image: ghcr.io/amitpatole/verel:1.0.0
  artifacthub.io/license: MIT
  artifacthub.io/signKey: |
    fingerprint: cosign keyless (Sigstore) — verify with the GitHub OIDC identity
    url: https://github.com/amitpatole/verel
  artifacthub.io/links: |
    - name: Install on Kubernetes / k3s
      url: https://amitpatole.github.io/verel/kubernetes/
    - name: Source
      url: https://github.com/amitpatole/verel
  artifacthub.io/maintainers: |
    - name: amitpatole
      email: amit.patole@gmail.com
