{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "verel.serviceAccountName" . }}
  labels: {{- include "verel.labels" . | nindent 4 }}
# The gate server needs NO Kubernetes API access — don't auto-mount a token (least privilege).
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end }}
