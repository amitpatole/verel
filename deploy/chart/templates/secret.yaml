{{- /* Create the auth Secret only when the user didn't reference an existing one AND provided a token
inline (dev convenience). Production: set auth.existingSecret to a Secret you manage out-of-band. */ -}}
{{- if and (not .Values.auth.existingSecret) .Values.auth.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "verel.authSecretName" . }}
  labels: {{- include "verel.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.auth.token | quote }}
  webhookSecret: {{ .Values.auth.webhookSecret | default "" | quote }}
{{- else if and (not .Values.auth.existingSecret) (not .Values.auth.token) }}
{{- fail "auth: provide either auth.existingSecret (a Secret with keys: token, webhookSecret) or auth.token — the gate's routable bind requires a bearer token." }}
{{- end }}
