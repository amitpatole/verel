apiVersion: v1
kind: Pod
metadata:
  name: {{ include "verel.fullname" . }}-test
  labels: {{- include "verel.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext: {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: probe
      image: cgr.dev/chainguard/curl:latest
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      command: ["curl"]
      args:
        - "-fsSk"
        - "{{ if and .Values.tls.enabled (not .Values.tls.insecure) }}https{{ else }}http{{ end }}://{{ include "verel.fullname" . }}:{{ .Values.service.port }}/health"
