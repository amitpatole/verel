apiVersion: v1
kind: Service
metadata:
  name: {{ include "verel.fullname" . }}
  labels: {{- include "verel.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "verel.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
