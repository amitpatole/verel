# Artifact Hub repository metadata for the OCI Helm chart. Pushed as an OCI artifact to
# oci://ghcr.io/amitpatole/charts/verel by .github/workflows/chart-release.yml so Artifact Hub can
# verify ownership of the listed repository.
#
# repositoryID is issued by Artifact Hub when the repository is first registered (Control Panel →
# Repositories → Add). Paste it here, then the next chart-release run re-pushes this file to claim
# ownership. Until then the listing works but is unverified.
