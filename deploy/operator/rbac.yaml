# Least-privilege RBAC for the Verel operator. It reconciles the four verel.dev CRDs into Jobs,
# Deployments and Services, and READS (never writes) Secrets to validate a Brain's connection. No
# wildcards, no escalate/bind, no cluster-admin.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: verel-operator
  namespace: verel-system
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: verel-operator
rules:
  # the Verel CRDs (+ status)
  - apiGroups: ["verel.dev"]
    resources: [gateruns, brains, gatewayservices, verelfleets,
                gateruns/status, brains/status, gatewayservices/status, verelfleets/status]
    verbs: [get, list, watch, patch, update]
  # GateRun → hardened Jobs
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [create, get, list, watch, delete]
  # GateRun → a deny-egress NetworkPolicy fencing the untrusted pod
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [create, get, patch]
  # GatewayService / VerelFleet → Deployments
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [create, get, list, watch, patch, update]
  # Services for the gateway
  - apiGroups: [""]
    resources: [services]
    verbs: [create, get, list, watch, patch]
  # READ-ONLY, single-object GET only: validate a Brain's connection Secret EXISTS (the operator never
  # reads its values; list/watch is intentionally NOT granted).
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  # kopf posts Events
  - apiGroups: [""]
    resources: [events]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: verel-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: verel-operator
subjects:
  - kind: ServiceAccount
    name: verel-operator
    namespace: verel-system
