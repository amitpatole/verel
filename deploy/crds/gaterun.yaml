apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateruns.verel.dev
spec:
  group: verel.dev
  scope: Namespaced
  names:
    kind: GateRun
    plural: gateruns
    singular: gaterun
    shortNames: [gr]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Repo, type: string, jsonPath: .spec.repo }
        - { name: Stage, type: string, jsonPath: .spec.stage }
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Verdict, type: string, jsonPath: .status.verdict }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [repo]
              properties:
                repo: { type: string, description: "Git URL of the repo to grade." }
                ref: { type: string, description: "Git ref/branch to check out (optional)." }
                stage:
                  type: string
                  enum: [inner_loop, pre_commit, pre_merge, post_merge]
                  default: pre_merge
                image: { type: string, description: "Override the Verel image." }
                runtimeClassName:
                  type: string
                  description: "Stronger kernel isolation (e.g. gvisor, kata) when the cluster offers it."
                timeoutSeconds: { type: integer, default: 600, minimum: 30, maximum: 7200 }
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase: { type: string, enum: [Pending, Running, Passed, Failed, Error] }
                verdict: { type: string, enum: [pass, warn, fail] }
                jobName: { type: string }
                message: { type: string }
                receipt:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
