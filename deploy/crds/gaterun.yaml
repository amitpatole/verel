apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateruns.verel.dev
spec:
  group: verel.dev
  scope: Namespaced
  names:
    kind: GateRun
    plural: gateruns
    singular: gaterun
    shortNames: [gr]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Repo, type: string, jsonPath: .spec.repo }
        - { name: Stage, type: string, jsonPath: .spec.stage }
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Verdict, type: string, jsonPath: .status.verdict }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [repo]
              properties:
                repo:
                  type: string
                  pattern: '^https://[A-Za-z0-9._~:/?#@!$&()*+,;=%-]{3,512}$'
                  description: "https:// git URL of the repo to grade (no ext::/file:///ssh://)."
                ref:
                  type: string
                  pattern: '^[^-\s][^\s]{0,255}$'
                  description: "Git ref/branch to check out (optional; no leading '-', no whitespace)."
                stage:
                  type: string
                  enum: [inner_loop, pre_commit, pre_merge, post_merge]
                  default: pre_merge
                runtimeClassName:
                  type: string
                  maxLength: 253
                  pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)*$'
                  description: "Stronger kernel isolation (e.g. gvisor, kata) when the cluster offers it."
                timeoutSeconds: { type: integer, default: 600, minimum: 30, maximum: 7200 }
                # NOTE: the gate image + resources are operator-controlled (the trusted image, fixed
                # limits) — author overrides are intentionally NOT part of the schema (and are pruned).
            status:
              type: object
              properties:
                phase: { type: string, enum: [Pending, Running, Passed, Failed, Error] }
                verdict: { type: string, enum: [pass, warn, fail] }
                jobName: { type: string }
                # Server-assigned uid of the operator-created gate Job. The verdict-mirror trusts ONLY
                # the Job whose uid matches this — the unforgeable handle that defeats verdict forgery.
                jobUID: { type: string }
                message: { type: string }
                receipt:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
